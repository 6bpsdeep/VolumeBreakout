services:
  - type: web
    name: kw-breakout
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: |
      cd client && npm install && npm run build && cd .. && cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kw-breakout-db
          property: connectionString

databases:
  - name: kw-breakout-db
    plan: free
    region: frankfurt
    postgresMajorVersion: 16
